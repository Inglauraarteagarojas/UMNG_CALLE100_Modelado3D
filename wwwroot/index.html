<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>UMNG - Modelo WebODM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --panel-bg: rgba(16, 51, 38, 0.66);
      --panel-fuerte: rgba(10, 35, 25, 0.8);
      --borde-claro: rgba(255, 255, 255, 0.28);
      --texto-panel: #f4fbff;
      --texto-secundario: rgba(235, 246, 255, 0.82);
      --fondo-superior: #75b9ff;
      --fondo-medio: #a9d7ff;
      --fondo-horizonte: #e8f6ff;
      --dorado: #d9b24c;
      --verde-umng: #1f6a46;
      --verde-umng-claro: #3b8b63;
      --sombra-panel: 0 24px 60px rgba(11, 34, 24, 0.24);
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 82% 14%, rgba(255, 244, 187, 0.9) 0 5%, rgba(255, 244, 187, 0.22) 10%, transparent 20%),
        linear-gradient(180deg, var(--fondo-superior) 0%, var(--fondo-medio) 46%, var(--fondo-horizonte) 100%);
      font-family: "Sora", sans-serif;
    }

    #escenario-fondo {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .nube {
      position: absolute;
      left: -22%;
      border-radius: 999px;
      background: rgba(172, 221, 255, 0.54);
      filter: blur(2px);
      opacity: 0.95;
      animation-name: nubeDesplazamiento;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .nube::before,
    .nube::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: inherit;
    }

    .nube::before {
      width: 42%;
      height: 120%;
      top: -36%;
      left: 14%;
    }

    .nube::after {
      width: 34%;
      height: 95%;
      top: -22%;
      right: 16%;
    }

    .nube-1 {
      top: 10%;
      width: 260px;
      height: 54px;
      animation-duration: 60s;
    }

    .nube-2 {
      top: 18%;
      width: 190px;
      height: 42px;
      animation-duration: 78s;
      animation-delay: -18s;
      opacity: 0.78;
    }

    .nube-3 {
      top: 28%;
      width: 320px;
      height: 62px;
      animation-duration: 96s;
      animation-delay: -30s;
      opacity: 0.66;
    }

    @keyframes nubeDesplazamiento {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(150vw);
      }
    }

    #panel {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      color: var(--texto-panel);
      background: var(--panel-bg);
      padding: 18px 20px;
      border-radius: 18px;
      font-size: 14px;
      border: 1px solid rgba(217, 178, 76, 0.28);
      backdrop-filter: blur(10px);
      box-shadow: var(--sombra-panel);
      min-width: 300px;
    }

    #panel-etiqueta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: rgba(217, 178, 76, 0.14);
      color: var(--texto-secundario);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #panel-etiqueta::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dorado);
      box-shadow: 0 0 12px rgba(246, 198, 91, 0.9);
    }

    #panel h2 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    #panel-subtitulo {
      margin-top: 8px;
      color: var(--texto-secundario);
      font-size: 13px;
      line-height: 1.5;
      max-width: 360px;
    }

    #panel-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .meta-item {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(217, 178, 76, 0.18);
      color: var(--texto-secundario);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #estado {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      color: #ecffeb;
      background: rgba(59, 139, 99, 0.2);
      border: 1px solid rgba(121, 201, 152, 0.28);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
    }

    #estado::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #88d99e;
      box-shadow: 0 0 10px rgba(136, 217, 158, 0.8);
    }

    #logos {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 20px;
      background: rgba(255, 251, 244, 0.92);
      border: 1px solid rgba(217, 178, 76, 0.22);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(25, 46, 33, 0.16);
      backdrop-filter: blur(12px);
    }

    .logo-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 96px;
      padding: 10px 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.96) 0%, rgba(243, 236, 222, 0.78) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    #logos img {
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.18));
    }

    #logo-escudo {
      width: 96px;
      height: 96px;
    }

    #logo-marca {
      width: 220px;
      height: 96px;
    }

    canvas {
      position: relative;
      z-index: 1;
    }

    @media (max-width: 720px) {
      #panel,
      #logos {
        left: 12px;
        right: 12px;
      }

      #panel {
        min-width: auto;
        padding: 16px;
      }

      #panel h2 {
        font-size: 20px;
      }

      #logos {
        top: auto;
        bottom: 12px;
        justify-content: center;
        padding: 10px 12px;
        gap: 10px;
      }

      .logo-item {
        min-height: 58px;
        padding: 6px 8px;
      }

      #logo-escudo {
        width: 68px;
        height: 68px;
      }

      #logo-marca {
        width: 156px;
        height: 68px;
      }
    }
  </style>
</head>

<body>

<div id="escenario-fondo"></div>
<div class="nube nube-1"></div>
<div class="nube nube-2"></div>
<div class="nube nube-3"></div>

<div id="panel">
  <div id="panel-etiqueta">Presentacion 3D</div>
  <h2>UMNG - Modelo WebODM</h2>
  <div id="panel-subtitulo">Modelo tridimensional con presentacion sobria, navegacion orbital y una composicion conjunta entre la escena UMNG y Patroclo animado.</div>
  <div id="panel-meta">
    <div class="meta-item">Visor GLB</div>
    <div class="meta-item">Recorrido orbital</div>
    <div class="meta-item">Patroclo animado</div>
  </div>
  <div id="estado">Cargando modelo...</div>
</div>

<div id="logos">
  <div class="logo-item">
    <img id="logo-escudo" src="modelos/webodm/image.png" alt="Escudo UMNG">
  </div>
  <div class="logo-item">
    <img id="logo-marca" src="modelos/webodm/logo.jpeg" alt="Logo UMNG">
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

  let escena;
  let camara;
  let renderizador;
  let controles;
  let referenciasEscena;
  let grupoModelos;
  let modeloPatroclo;
  let patrocloArrastrando = false;

  const mezcladores = [];
  const reloj = new THREE.Clock();
  const raycaster = new THREE.Raycaster();
  const puntero = new THREE.Vector2();
  const puntoArrastre = new THREE.Vector3();
  const desfaseArrastre = new THREE.Vector3();
  const planoArrastre = new THREE.Plane();
  const direccionCamara = new THREE.Vector3();
  const posicionPatroclo = new THREE.Vector3();

  const caja = new THREE.Box3();
  const centro = new THREE.Vector3();
  const tamano = new THREE.Vector3();

  const estado = document.getElementById("estado");

  iniciar();

  function iniciar() {
    escena = new THREE.Scene();
    escena.background = null;
    escena.fog = new THREE.Fog(0xd8ecfa, 420, 1600);
    grupoModelos = new THREE.Group();
    escena.add(grupoModelos);

    camara = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100000
    );

    camara.position.set(0, 80, 180);

    try {
      renderizador = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: "high-performance"
      });
    } catch (error) {
      estado.innerText = "No fue posible iniciar WebGL en este navegador";
      console.error("Error creando el renderer WebGL:", error);
      return;
    }

    renderizador.setSize(window.innerWidth, window.innerHeight);
    renderizador.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderizador.domElement);

    controles = new OrbitControls(camara, renderizador.domElement);
    controles.enableDamping = true;
    controles.dampingFactor = 0.05;
    controles.enableZoom = true;
    controles.enablePan = true;
    controles.enableRotate = true;
    controles.minPolarAngle = 0.15;
    controles.maxPolarAngle = Math.PI / 2.05;
    controles.screenSpacePanning = true;

    const luzAmbiente = new THREE.AmbientLight(0xffffff, 1.4);
    escena.add(luzAmbiente);

    const luzHemisferica = new THREE.HemisphereLight(0xe4f3ff, 0x8b8f94, 1.35);
    escena.add(luzHemisferica);

    const luzDireccional = new THREE.DirectionalLight(0xfff8df, 1.55);
    luzDireccional.position.set(180, 260, 140);
    escena.add(luzDireccional);

    cargarEscenaModelos();

    window.addEventListener("resize", ajustarPantalla);
    animar();
  }

  function cargarEscenaModelos() {
    const ruta = "modelos/webodm/";
    const archivoModelo = "UMNG.glb";
    const archivoPatroclo = "animacionPatroclo.glb";

    cargarGlb(
      ruta + archivoModelo,
      "Cargando UMNG",
      function(gltf) {
        const modeloUmng = gltf.scene;

        escalarModeloParaSuelo(modeloUmng);
        apoyarModeloEnSuelo(modeloUmng);
        modeloUmng.position.y = 0;

        const medidasUmng = medirObjeto(modeloUmng);
        grupoModelos.add(modeloUmng);

        cargarGlb(
          ruta + archivoPatroclo,
          "Cargando Patroclo",
          function(gltfPatroclo) {
            const patrocloScene = gltfPatroclo.scene;

            escalarPatroclo(patrocloScene, medidasUmng.tamano.y);
            apoyarModeloEnSuelo(patrocloScene);
            patrocloScene.position.x = Math.max(medidasUmng.tamano.x * 0.48, 52);
            patrocloScene.position.z = Math.max(medidasUmng.tamano.z * 0.14, 18);
            patrocloScene.position.y = Math.max(medidasUmng.tamano.y * 0.62, 68);
            patrocloScene.rotation.y = -Math.PI * 0.12;

            patrocloScene.name = "Patroclo";
            patrocloScene.userData.esArrastrable = true;
            patrocloScene.userData.bloquearY = patrocloScene.position.y;
            modeloPatroclo = patrocloScene;
            grupoModelos.add(modeloPatroclo);
            activarAnimaciones(gltfPatroclo, modeloPatroclo);
            configurarArrastrePatroclo();

            crearReferenciasEscena();
            ajustarCamaraAlModelo(grupoModelos);

            estado.innerText = "Modelos cargados correctamente";
            console.log("Escena 3D cargada correctamente");
          },
          function(error) {
            estado.innerText = "Error cargando Patroclo";
            console.error("Error cargando Patroclo:", error);
          }
        );
      },
      function(error) {
        estado.innerText = "Error cargando UMNG";
        console.error("Error cargando UMNG:", error);
      }
    );
  }

  function cargarGlb(rutaArchivo, textoCarga, alCargar, alError) {
    const gltfLoader = new GLTFLoader();

    gltfLoader.load(
      rutaArchivo,
      alCargar,
      function(xhr) {
        if (xhr.total > 0) {
          const porcentaje = (xhr.loaded / xhr.total) * 100;
          estado.innerText = textoCarga + ": " + porcentaje.toFixed(1) + "%";
        } else {
          estado.innerText = textoCarga + "...";
        }
      },
      alError
    );
  }

  function medirObjeto(objeto) {
    const cajaLocal = new THREE.Box3().setFromObject(objeto);

    return {
      caja: cajaLocal,
      centro: cajaLocal.getCenter(new THREE.Vector3()),
      tamano: cajaLocal.getSize(new THREE.Vector3())
    };
  }

  function apoyarModeloEnSuelo(objeto) {
    const medidas = medirObjeto(objeto);

    objeto.position.sub(medidas.centro);
    objeto.position.y += medidas.tamano.y * 0.5;
  }

  function escalarModeloParaSuelo(objeto) {
    const medidas = medirObjeto(objeto);
    const dimensionHorizontal = Math.max(medidas.tamano.x, medidas.tamano.z);

    if (dimensionHorizontal <= 0) {
      return;
    }

    const escalaObjetivo = 220 / dimensionHorizontal;
    const factorEscala = Math.min(Math.max(escalaObjetivo, 1.35), 8);

    objeto.scale.setScalar(factorEscala);
    objeto.updateMatrixWorld(true);
  }

  function escalarPatroclo(objeto, alturaReferencia) {
    const medidas = medirObjeto(objeto);

    if (medidas.tamano.y <= 0) {
      return;
    }

    const alturaObjetivo = Math.max(alturaReferencia * 1.45, 180);
    const factorEscala = Math.min(Math.max(alturaObjetivo / medidas.tamano.y, 0.95), 5);

    objeto.scale.setScalar(factorEscala);
    objeto.updateMatrixWorld(true);
  }

  function configurarArrastrePatroclo() {
    renderizador.domElement.removeEventListener("pointerdown", alIniciarArrastrePatroclo);
    renderizador.domElement.removeEventListener("pointermove", alMoverPatroclo);
    renderizador.domElement.removeEventListener("pointerup", alFinalizarArrastrePatroclo);
    renderizador.domElement.removeEventListener("pointerleave", alFinalizarArrastrePatroclo);

    renderizador.domElement.addEventListener("pointerdown", alIniciarArrastrePatroclo);
    renderizador.domElement.addEventListener("pointermove", alMoverPatroclo);
    renderizador.domElement.addEventListener("pointerup", alFinalizarArrastrePatroclo);
    renderizador.domElement.addEventListener("pointerleave", alFinalizarArrastrePatroclo);
  }

  function actualizarPuntero(evento) {
    const recta = renderizador.domElement.getBoundingClientRect();

    puntero.x = ((evento.clientX - recta.left) / recta.width) * 2 - 1;
    puntero.y = -((evento.clientY - recta.top) / recta.height) * 2 + 1;
  }

  function alIniciarArrastrePatroclo(evento) {
    if (!modeloPatroclo) {
      return;
    }

    actualizarPuntero(evento);
    raycaster.setFromCamera(puntero, camara);

    const intersecciones = raycaster.intersectObject(modeloPatroclo, true);

    if (intersecciones.length === 0) {
      return;
    }

    patrocloArrastrando = true;
    controles.enabled = false;
    renderizador.domElement.style.cursor = "grabbing";

    camara.getWorldDirection(direccionCamara);
    modeloPatroclo.getWorldPosition(posicionPatroclo);
    planoArrastre.setFromNormalAndCoplanarPoint(direccionCamara, posicionPatroclo);

    if (raycaster.ray.intersectPlane(planoArrastre, puntoArrastre)) {
      desfaseArrastre.copy(posicionPatroclo).sub(puntoArrastre);
    } else {
      desfaseArrastre.set(0, 0, 0);
    }
  }

  function alMoverPatroclo(evento) {
    if (!modeloPatroclo) {
      return;
    }

    actualizarPuntero(evento);

    if (!patrocloArrastrando) {
      raycaster.setFromCamera(puntero, camara);
      const intersecciones = raycaster.intersectObject(modeloPatroclo, true);
      renderizador.domElement.style.cursor = intersecciones.length > 0 ? "grab" : "default";
      return;
    }

    raycaster.setFromCamera(puntero, camara);

    if (!raycaster.ray.intersectPlane(planoArrastre, puntoArrastre)) {
      return;
    }

    modeloPatroclo.position.copy(puntoArrastre).add(desfaseArrastre);
  }

  function alFinalizarArrastrePatroclo() {
    if (!patrocloArrastrando) {
      return;
    }

    patrocloArrastrando = false;
    controles.enabled = true;
    renderizador.domElement.style.cursor = "default";
  }

  function activarAnimaciones(gltf, objeto) {
    if (!gltf.animations || gltf.animations.length === 0) {
      return;
    }

    const mezclador = new THREE.AnimationMixer(objeto);

    const clipPrincipal = gltf.animations[0];
    const accion = mezclador.clipAction(clipPrincipal);
    accion.reset();
    accion.setLoop(THREE.LoopRepeat);
    accion.clampWhenFinished = false;
    accion.play();

    mezcladores.push(mezclador);
  }

  function ajustarPantalla() {
    if (!renderizador) {
      return;
    }

    camara.aspect = window.innerWidth / window.innerHeight;
    camara.updateProjectionMatrix();
    renderizador.setSize(window.innerWidth, window.innerHeight);
  }

  function ajustarCamaraAlModelo(objeto) {
    caja.setFromObject(objeto);
    caja.getCenter(centro);
    caja.getSize(tamano);

    const dimensionMaxima = Math.max(tamano.x, tamano.y, tamano.z);
    const fov = camara.fov * (Math.PI / 180);
    const distancia = (dimensionMaxima / 2) / Math.tan(fov / 2);
    const objetivoCamara = new THREE.Vector3(0, tamano.y * 0.18, 0);

    camara.near = Math.max(0.1, distancia / 100);
    camara.far = Math.max(1000, distancia * 20);
    camara.updateProjectionMatrix();

    camara.position.set(
      objetivoCamara.x + distancia * 0.9,
      objetivoCamara.y + distancia * 0.65,
      objetivoCamara.z + distancia * 1.15
    );

    controles.minDistance = Math.max(dimensionMaxima * 0.2, 5);
    controles.maxDistance = Math.max(dimensionMaxima * 4, 100);
    controles.target.copy(objetivoCamara);
    controles.update();
  }

  function crearReferenciasEscena() {
    if (referenciasEscena) {
      escena.remove(referenciasEscena);
    }

    referenciasEscena = new THREE.Group();

    caja.setFromObject(grupoModelos);
    caja.getSize(tamano);

    const dimensionHorizontal = Math.max(tamano.x, tamano.z);
    const radioBase = Math.max(dimensionHorizontal * 0.62, 90);

    const plano = new THREE.Mesh(
      new THREE.CircleGeometry(radioBase, 96),
      new THREE.MeshBasicMaterial({
        color: 0x747b84,
        transparent: true,
        opacity: 0.92,
        side: THREE.DoubleSide
      })
    );
    plano.rotation.x = -Math.PI / 2;
    plano.position.y = -0.05;
    referenciasEscena.add(plano);

    escena.add(referenciasEscena);
  }

  function animar() {
    if (!renderizador || !controles) {
      return;
    }

    requestAnimationFrame(animar);
    const delta = reloj.getDelta();

    for (const mezclador of mezcladores) {
      mezclador.update(delta);
    }

    controles.update();
    renderizador.render(escena, camara);
  }
</script>

</body>
</html>
